services:
  app:
    build: .
    container_name: app-python
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - USUARIO_ADMIN=${USUARIO_ADMIN}
      - PASSWORD_ADMIN=${PASSWORD_ADMIN}
    networks:
      - web

networks:
  web:
    driver: bridge