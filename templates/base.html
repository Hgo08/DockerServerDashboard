<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           DEFINICIÓN DE VARIABLES SASS/CSS (ESTILOS COHESIVOS)
           ========================================================================== */

        /* Paleta de colores por defecto para el modo oscuro */
        :root {
            --background-color: #1e222b;
            --hover-color: #282e3d;
            --hover-text-color: #52a0e6;
            --text-color: white;
            --menu-icon-color: white;
            --main-bg: #0f1117;
            --main-text: white;
        }

        /* Paleta de colores alternativa que se aplica al activar el modo claro */
        body.light-theme {
            --background-color: #ffffff;
            --hover-color: #f0f2f5;
            --hover-text-color: #1d4ed8;
            /* Azul llamativo adaptado para el modo claro */
            --text-color: #1f2937;
            --menu-icon-color: #1f2937;
            --main-bg: #f4f4f4;
            --main-text: #1f2937;
        }

        /* ==========================================================================
           ESTILOS ESTRUCTURALES Y RESETEO DE MÁRGENES
           ========================================================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--main-bg);
            color: var(--main-text);
            display: flex;
            transition: background-color 0.3s;
        }

        /* ==========================================================================
           BARRA LATERAL (SIDEBAR)
           ========================================================================== */

        aside {
            width: 250px;
            height: 100vh;
            background-color: var(--background-color);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, background-color 0.3s;
            z-index: 100;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        aside.closed {
            width: 70px;
        }

        .menu-container {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .menu {
            width: 1.5rem;
            height: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu div {
            width: 100%;
            height: 0.15rem;
            background-color: var(--menu-icon-color);
            border-radius: 2px;
            transition: background-color 0.3s;
        }

        /* ==========================================================================
           ELEMENTOS DE NAVEGACIÓN Y BOTONES
           ========================================================================== */

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            height: 100%;
        }

        .theme-link {
            margin-top: auto;
            color: var(--text-color);
            text-decoration: none;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.5rem;
            transition: background 0.3s, color 0.3s;
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: background 0.3s, color 0.3s;
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
            display: inline-block;
        }

        aside.closed .menu-text {
            display: none;
        }

        /*cambia tanto el fondo como el color del texto e icono a la vez */
        .menu-link:hover {
            background-color: var(--hover-color);
            color: var(--hover-text-color);
        }

        .menu-link.active {
            background-color: #3b82f6;
            color: white;
        }

        /* ==========================================================================
           ÁREA DE CONTENIDO PRINCIPAL
           ========================================================================== */

        main {
            margin-left: 250px;
            padding: 2rem;
            width: 100%;
            transition: margin-left 0.3s ease;
        }

        aside.closed~main {
            margin-left: 70px;
        }

        header {
            z-index: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0.45rem 2rem 0.45rem 1.45rem;
            border-bottom: 2px solid rgb(0, 0, 0);
            position: fixed;
            top: 0;
            left: 0;
            transition: background-color 0.3s, border-color 0.3s;
        }
    </style>
</head>

<body>
    <header>
        <div class="right">
            <div id="btn-theme" style="cursor: pointer; font-size: 1.2rem; color: var(--menu-icon-color);">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>
    <aside id="sidebar">
        <div class="menu-container" id="btn-toggle">
            <div class="menu">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>

        <nav class="sidebar-menu">
            <a href="{{ url_for('monitor.monitor') }}"
                class="menu-link {% if request.endpoint == 'monitor' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-chart-line"></i></span>
                <span class="menu-text">Monitor</span>
            </a>

            <a href="{{ url_for('monitor.services') }}"
                class="menu-link {% if request.endpoint == 'services' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-server"></i></span>
                <span class="menu-text">Procesos</span>
            </a>

            <hr
                style="margin-top: auto; border: 0; border-top: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 0.5rem;">

            <a href="{{ url_for('monitor.settings') }}"
                class="menu-link {% if request.endpoint == 'settings' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-cog"></i></span>
                <span class="menu-text">Ajustes</span>
            </a>

            <a href="{{ url_for('auth.logout') }}" class="menu-link">
                <span class="menu-icon"><i class="fas fa-right-from-bracket"></i></span>
                <span class="menu-text">Log Out</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // 1. COMPROBACIÓN INICIAL: Se ejecuta de inmediato al cargar cualquier página
        const currentTheme = localStorage.getItem('theme');
        const btnTheme = document.getElementById('btn-theme');

        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        // Aseguramos que el icono empiece con la forma correcta según el tema guardado
        document.addEventListener("DOMContentLoaded", () => {
            const icono = btnTheme.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun';
            } else {
                icono.className = 'fas fa-moon';
            }
        });

        // 2. EL EVENTO CLICK: Guarda la elección del usuario
        btnTheme.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');

            const icono = btnTheme.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light'); // Guardamos modo claro
            } else {
                icono.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');  // Guardamos modo oscuro
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
