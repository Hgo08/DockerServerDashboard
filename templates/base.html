<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* TEMA OSCURO (Por defecto) */
        :root {
            --black1: #0a0a0a;
            --black2: #171717;
            --black3: #1E1E1E;
            --black4: #2F2F2F;
            --card-bg: #171717;
            --border-color: #2F2F2F;
            --body-bg: #0a0a0a;
            --text-color: #f0f0f1;
            --menu-icon-color: #f0f0f1;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 60px;
        }

        /* TEMA CLARO */
        body.light-theme {
            --black1: #f4f5f7;
            --black2: #ffffff;
            --black3: #ffffff;
            --black4: #e2e8f0;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --body-bg: #f4f5f7;
            --text-color: #1e293b;
            --menu-icon-color: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header Superior */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 30px;
            height: 60px;
            background-color: var(--black2);
            border-bottom: 1px solid var(--border-color);
        }

        /* Sidebar (Ancho por defecto: Abierto) */
        aside {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background-color: var(--black2);
            transition: width 0.3s ease;
            overflow: hidden;
            z-index: 1000;
            border-right: 1px solid var(--border-color);
        }

        aside.closed {
            width: var(--sidebar-collapsed-width);
        }

        /* Botón Hamburguesa */
        .menu-container {
            display: flex;
            align-items: center;
            padding: 15px;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--menu-icon-color);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .toggle-btn:hover {
            background-color: var(--black4);
        }

        /* Menú de navegación cambiado a Flexbox */
        .sidebar-menu {
            list-style: none;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px);
        }

        .menu-item {
            margin: 2px 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .menu-link:hover {
            background-color: var(--black4);
            color: #72afd2;
        }

        .menu-link.active {
            background-color: var(--black3);
            border-left: 4px solid #2271b1;
            color: #72afd2;
        }

        .menu-icon {
            min-width: 30px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--menu-icon-color);
        }

        /* Ocultar texto si el sidebar está cerrado */
        .menu-text {
            margin-left: 15px;
            opacity: 1;
            transition: opacity 0.2s;
        }

        aside.closed .menu-text {
            opacity: 0;
            pointer-events: none;
        }

        /* Contenido principal */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        /* Ajuste del contenido cuando el sidebar se cierra */
        aside.closed~.main-content {
            margin-left: var(--sidebar-collapsed-width);
        }

        .menu-separator {
            height: 1px;
            background-color: var(--border-color);
            margin: 10px 15px;
            margin-top: auto;
        }

        /* Grid de Tarjetas */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .valor {
            font-size: 2rem;
            font-weight: bold;
        }

        .label {
            color: var(--text-color);
            font-size: 0.95rem;
        }

        /* Ajuste Responsive Móvil */
        @media (max-width: 768px) {
            aside {
                width: var(--sidebar-collapsed-width);
            }

            aside .menu-text {
                display: none;
            }

            .main-content,
            aside.closed~.main-content {
                margin-left: var(--sidebar-collapsed-width);
            }
        }
    </style>
</head>

<body>
    <aside id="sidebar">
        <div class="menu-container">
            <button class="toggle-btn" id="btn-toggle" type="button">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <ul class="sidebar-menu">
            <li class="menu-item">
                <a href="{{ url_for('monitor.monitor') }}"
                    class="menu-link {% if request.endpoint == 'monitor.monitor' %}active{% endif %}">
                    <span class="menu-icon"><i class="fas fa-chart-line"></i></span>
                    <span class="menu-text">Monitor</span>
                </a>
            
            </li>
            <li class="menu-item">
                <a href="{{ url_for('monitor.process') }}"
                    class="menu-link {% if request.endpoint == 'monitor.process' %}active{% endif %}">
                    <span class="menu-icon"><i class="fas fa-tasks"></i></span>
                    <span class="menu-text">Procesos</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{{ url_for('monitor.disks') }}"
                    class="menu-link {% if request.endpoint == 'monitor.disks' %}active{% endif %}">
                    <span class="menu-icon"><i class="fas fa-server"></i></span>
                    <span class="menu-text">Discos</span>
                </a>
            </li>

            <li class="menu-separator"></li>

            <li class="menu-item">
                <a href="{{ url_for('monitor.settings') }}"
                    class="menu-link {% if request.endpoint == 'monitor.settings' %}active{% endif %}">
                    <span class="menu-icon"><i class="fas fa-cog"></i></span>
                    <span class="menu-text">Ajustes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{{ url_for('auth.logout') }}" class="menu-link">
                    <span class="menu-icon"><i class="fas fa-right-from-bracket"></i></span>
                    <span class="menu-text">Log Out</span>
                </a>
            </li>
        </ul>
    </aside>

    <header>
        <div class="right">
            <div id="btn-theme" style="cursor: pointer; font-size: 1.2rem; color: var(--menu-icon-color);">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // 1. COMPROBACIÓN INMEDIATA (Evita parpadeos de blanco/negro al cargar)
        const sidebarState = localStorage.getItem('sidebar');
        const sidebar = document.getElementById('sidebar');
        if (sidebarState === 'closed') {
            sidebar.classList.add('closed');
        }

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        // 2. LOGICA CUANDO EL DOM ESTÁ LISTO
        document.addEventListener("DOMContentLoaded", () => {
            const btnTheme = document.getElementById('btn-theme');
            const icono = btnTheme.querySelector('i');

            // Ajustar icono inicial del tema
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun';
            } else {
                icono.className = 'fas fa-moon';
            }

            // EVENTO CLICK DEL SIDEBAR (HAMBURGUESA)
            const btnToggle = document.getElementById('btn-toggle');
            btnToggle.addEventListener('click', () => {
                sidebar.classList.toggle('closed');
                if (sidebar.classList.contains('closed')) {
                    localStorage.setItem('sidebar', 'closed');
                } else {
                    localStorage.setItem('sidebar', 'opened');
                }
            });

            // EVENTO CLICK DEL TEMA
            btnTheme.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');

                if (document.body.classList.contains('light-theme')) {
                    icono.className = 'fas fa-sun';
                    localStorage.setItem('theme', 'light');
                } else {
                    icono.className = 'fas fa-moon';
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
