<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar con Cambio de Tema</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           DEFINICIÓN DE VARIABLES SASS/CSS (ESTILOS COHESIVOS)
           ========================================================================== */

        /* Paleta de colores por defecto para el modo oscuro */
        :root {
            --background-color: #0f1117;
            --hover-color: #1f2330;
            --text-color: white;
            --menu-icon-color: white;
            --main-bg: #1e222b; 
            --main-text: white;
        }

        /* Paleta de colores alternativa que se aplica al activar el modo claro */
        body.light-theme {
            --background-color: #ffffff;
            --hover-color: #f0f2f5;
            --text-color: #1f2937;
            --menu-icon-color: #1f2937;
            --main-bg: #f4f4f4; 
            --main-text: #1f2937;
        }

        /* ==========================================================================
           ESTILOS ESTRUCTURALES Y RESETEO DE MÁRGENES
           ========================================================================== */

        /* Reseteo general para eliminar márgenes y paddings predeterminados del navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuración del contenedor principal en formato flexible (Flexbox) */
        body {
            font-family: Arial, sans-serif;
            background-color: var(--main-bg);
            color: var(--main-text);
            display: flex;
            transition: background-color 0.3s; /* Transición fluida al alternar colores */
        }

        /* ==========================================================================
           ESTILOS DE LA BARRA LATERAL (SIDEBAR)
           ========================================================================== */

        /* Estructura base de la barra de navegación lateral */
        aside {
            width: 250px;
            height: 100vh;
            background-color: var(--background-color);
            position: fixed; /* Mantiene el menú visible durante el desplazamiento vertical */
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, background-color 0.3s; /* Animación para apertura y cierre */
            z-index: 100;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estado modificado mediante JavaScript para contraer la barra lateral */
        aside.closed {
            width: 70px;
        }

        /* ==========================================================================
           BOTÓN DE CONTROL DE LA SIDEBAR (MENÚ HAMBURGUESA)
           ========================================================================== */

        /* Contenedor del icono de tres líneas */
        .menu-container {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Dimensiones del icono del menú */
        .menu {
            width: 1.5rem;
            height: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Estilo individual para cada una de las tres líneas horizontales */
        .menu div {
            width: 100%;
            height: 0.15rem;
            background-color: var(--menu-icon-color);
            border-radius: 2px;
            transition: background-color 0.3s;
        }

        /* ==========================================================================
           ELEMENTOS DE NAVEGACIÓN Y BOTONES
           ========================================================================== */

        /* Contenedor vertical para los enlaces del menú */
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            height: 100%;
        }

        /* Estilo base para cada enlace o botón de la barra lateral */
        .menu-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: background 0.3s, color 0.3s;
            overflow: hidden; /* Oculta desbordamientos de texto al contraer la barra */
            white-space: nowrap; /* Impide que el texto se divida en varias líneas */
            cursor: pointer;
        }

        /* Espaciado y alineación uniforme para los iconos de FontAwesome */
        .menu-icon {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
            display: inline-block;
        }

        /* Ocultación del texto descriptivo cuando la barra lateral se encuentra contraída */
        aside.closed .menu-text {
            display: none;
        }

        /* Cambio visual interactivo cuando el cursor se posiciona sobre un enlace */
        .menu-link:hover {
            background-color: var(--hover-color);
        }

        /* Estilo distintivo para el enlace correspondiente a la página activa actual */
        .menu-link.active {
            background-color: #3b82f6;
            color: white;
        }

        /* ==========================================================================
           SECCIÓN INFERIOR DE AJUSTES (BOTONES DE TEMA Y CIERRE DE SESIÓN)
           ========================================================================== */

        /* Alineación forzada del botón de cambio de tema y elementos posteriores hacia el fondo */
        .theme-link {
            margin-top: auto; 
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }

        /* ==========================================================================
           ÁREA DE CONTENIDO PRINCIPAL
           ========================================================================== */

        /* Espacio reservado a la derecha de la barra lateral para la interfaz de la aplicación */
        main {
            margin-left: 250px;
            padding: 2rem;
            width: 100%;
            transition: margin-left 0.3s ease; /* Desplazamiento sincronizado con la barra lateral */
        }

        /* Reajuste del margen del contenido cuando la barra lateral cambia al estado contraído */
        aside.closed ~ main {
            margin-left: 70px;
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="menu-container" id="btn-toggle">
            <div class="menu">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>

        <nav class="sidebar-menu">
            <a href="{{ url_for('monitor.monitor') }}" class="menu-link {% if request.endpoint == 'monitor' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-chart-line"></i></span>
                <span class="menu-text">Monitor</span>
            </a>

            <a href="{{ url_for('monitor.services') }}" class="menu-link {% if request.endpoint == 'services' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-server"></i></span>
                <span class="menu-text">Servicios</span>
            </a>

            <a href="{{ url_for('monitor.settings') }}" class="menu-link {% if request.endpoint == 'settings' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-cog"></i></span>
                <span class="menu-text">Ajustes</span>
            </a>

            <div class="menu-link theme-link" id="btn-theme">
                <span class="menu-icon"><i class="fas fa-moon"></i></span>
                <span class="menu-text">Cambiar Tema</span>
            </div>

            <a href="{{ url_for('auth.logout') }}" class="menu-link">
                <span class="menu-icon"><i class="fas fa-right-from-bracket"></i></span>
                <span class="menu-text">Log Out</span>
            </a>
        </nav>
    </aside>

    <script src="pene.js"></script>

    <script>
        /* 1. Gestión del despliegue de la barra lateral */
        const btnToggle = document.getElementById('btn-toggle');
        const sidebar = document.getElementById('sidebar');

        // Escucha las interacciones del usuario en el botón para alternar el estado físico del menú
        btnToggle.addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        /* 2. Gestión del esquema de color global (Temas) */
        const btnTheme = document.getElementById('btn-theme');

        // Aplica o remueve la clase responsable del modo claro en el nodo principal (body)
        btnTheme.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            
            // Evaluación del estado del DOM para actualizar el icono visual entre el sol y la luna
            const icono = btnTheme.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun'; 
            } else {
                icono.className = 'fas fa-moon'; 
            }
        });
    </script>
</body>
</html>
