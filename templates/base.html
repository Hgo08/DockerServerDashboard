<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           DEFINICIÓN DE VARIABLES (ESTILOS COHESIVOS Y MODOS)
           ========================================================================== */
        :root {
            /* Paleta Modo Oscuro por defecto */
            --background-color: #171717;
            --hover-color: #2F2F2F;
            --hover-text-color: #52a0e6;
            --text-color: #ced4da;
            --menu-icon-color: #f0f0f1;
            --main-bg: #0a0a0a;
            --main-text: #ffffff;
            --card-bg: #1e1e1e;
            --card-border: #3c434a;
        }

        body.light-theme {
            /* Paleta Modo Claro */
            --background-color: #ffffff;
            --hover-color: #f0f2f5;
            --hover-text-color: #1d4ed8;
            --text-color: #1f2937;
            --menu-icon-color: #1f2937;
            --main-bg: #f4f4f4;
            --main-text: #1f2937;
            --card-bg: #ffffff;
            --card-border: #ced4da;
        }

        /* ==========================================================================
           ESTILOS ESTRUCTURALES Y RESETEO
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--main-bg);
            color: var(--main-text);
            display: flex;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        /* ==========================================================================
           BARRA LATERAL (SIDEBAR)
           ========================================================================== */
        aside {
            width: 260px;
            height: 100vh;
            background-color: var(--background-color);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, background-color 0.3s;
            z-index: 1000;
            border-right: 1px solid var(--card-border);
        }

        aside.closed {
            width: 60px;
        }

        .menu-container {
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            height: 60px;
        }

        .menu {
            font-size: 1.2rem;
            color: var(--menu-icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
        }

        /* ==========================================================================
           ELEMENTOS DE NAVEGACIÓN
           ========================================================================== */
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            height: 100%;
            list-style: none;
            padding: 15px 0;
        }

        .menu-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 18px;
            min-width: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-text {
            margin-left: 15px;
            opacity: 1;
            transition: opacity 0.3s;
        }

        aside.closed .menu-text {
            opacity: 0;
            pointer-events: none;
        }

        .menu-link:hover {
            background-color: var(--hover-color);
            color: var(--hover-text-color);
        }

        .menu-link.active {
            background-color: var(--hover-color);
            border-left: 4px solid #2271b1;
            color: var(--hover-text-color);
        }

        /* ==========================================================================
           CONTENIDO PRINCIPAL Y DASHBOARD (GRID)
           ========================================================================== */
        main {
            margin-left: 260px;
            padding: 90px 30px 30px 30px;
            /* Margen superior para no dar con el header fijo */
            width: 100%;
            transition: margin-left 0.3s ease;
        }

        aside.closed~main {
            margin-left: 60px;
        }

        header {
            z-index: 900;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px 30px;
            border-bottom: 1px solid var(--card-border);
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--main-bg);
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* Contenedor de Tarjetas (Monitorización) */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px 0;
            width: 100%;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .valor {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--main-text);
            margin-bottom: 8px;
        }

        .label {
            color: var(--text-color);
            font-size: 0.95rem;
        }

        /* Ajuste Responsive Móvil */
        @media (max-width: 768px) {
            aside {
                width: 60px;
            }

            aside .menu-text {
                display: none;
            }

            main {
                margin-left: 60px;
            }

            aside.closed~main {
                margin-left: 60px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="right">
            <div id="btn-theme" style="cursor: pointer; font-size: 1.2rem; color: var(--menu-icon-color);">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <aside id="sidebar">
        <div class="menu-container" id="btn-toggle">
            <div class="menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <nav class="sidebar-menu">
            <a href="{{ url_for('monitor.monitor') }}"
                class="menu-link {% if request.endpoint == 'monitor.monitor' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-chart-line"></i></span>
                <span class="menu-text">Monitor</span>
            </a>

            <a href="{{ url_for('monitor.process') }}"
                class="menu-link {% if request.endpoint == 'monitor.process' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-tasks"></i></span>
                <span class="menu-text">Procesos</span>
            </a>

            <hr style="margin-top: auto; border: 0; border-top: 1px solid var(--card-border); margin-bottom: 0.5rem;">

            <a href="{{ url_for('monitor.settings') }}"
                class="menu-link {% if request.endpoint == 'monitor.settings' %}active{% endif %}">
                <span class="menu-icon"><i class="fas fa-cog"></i></span>
                <span class="menu-text">Ajustes</span>
            </a>

            <a href="{{ url_for('auth.logout') }}" class="menu-link">
                <span class="menu-icon"><i class="fas fa-right-from-bracket"></i></span>
                <span class="menu-text">Log Out</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // COMPROBACIÓN DEL SIDEBAR: Se ejecuta de inmediato antes de pintar la web para evitar parpadeos
        const sidebarState = localStorage.getItem('sidebar');
        const sidebar = document.getElementById('sidebar');
        if (sidebarState === 'closed') {
            sidebar.classList.add('closed');
        }

        // 1. COMPROBACIÓN INICIAL: Se ejecuta de inmediato al cargar cualquier página
        const currentTheme = localStorage.getItem('theme');
        const btnTheme = document.getElementById('btn-theme');

        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        // Aseguramos que el icono empiece con la forma correcta según el tema guardado
        document.addEventListener("DOMContentLoaded", () => {
            const icono = btnTheme.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun';
            } else {
                icono.className = 'fas fa-moon';
            }

            // EVENTO CLICK DEL SIDEBAR (HAMBURGUESA)
            const btnToggle = document.getElementById('btn-toggle');
            btnToggle.addEventListener('click', () => {
                sidebar.classList.toggle('closed');

                // Guardar la preferencia en el localStorage
                if (sidebar.classList.contains('closed')) {
                    localStorage.setItem('sidebar', 'closed');
                } else {
                    localStorage.setItem('sidebar', 'opened');
                }
            });
        });

        // 2. EL EVENTO CLICK: Guarda la elección del usuario
        btnTheme.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');

            const icono = btnTheme.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icono.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light'); // Guardamos modo claro
            } else {
                icono.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');  // Guardamos modo oscuro
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
