{% extends "base.html" %}
{% block content %}

<style>
    .title {
        margin-top: 20px;
        margin-bottom: 20px;
        color: var(--text-color);
    }

    .global-card {
        border: 1px solid var(--border-color);
        background-color: var(--card-bg); 
        border-radius: 10px;
        padding: 10px;
        transition: background-color 0.3s, border-color 0.3s;
    }

    .grid-row-disks {
        display: grid;
        grid-template-columns: 200px 1fr 150px 150px 150px 100px 150px;
        align-items: center;
        gap: 15px;
        padding: 10px;
        color: var(--text-color);
    }

    .grid-row-partitions {
        display: grid;
        grid-template-columns: 250px 200px 1fr 150px;
        align-items: center;
        gap: 15px;
        padding: 10px;
        color: var(--text-color);
    }

    .section-title {
        font-weight: bold;
        color: #72afd2; 
    }

    .separator {
        border: none;
        border-top: 1px solid var(--border-color); 
        margin: 10px -10px;
    }

    .progress-bar-container {
        background: var(--black4);
        border-radius: 10px;
        height: 8px;
        width: 100%;
        overflow: hidden;
    }

    .progress-fill {
        background: #2ecc71; 
        height: 100%;
    }

    .loading-text {
        padding: 20px;
        text-align: center;
        color: var(--text-color);
        font-style: italic;
        opacity: 0.7;
    }
</style>

<h1 class="title">Almacenamiento</h1>

<h2 class="title"><i class="fa-solid fa-hard-drive"></i> Discos físicos</h2>
<div class="global-card">
    <div class="grid-row-disks section-title">
        <div>Disco</div>
        <div>Modelo</div>
        <div>Escritura</div>
        <div>Lectura</div>
        <div>Temperatura</div>
        <div>Salud</div>
        <div>Tamaño</div>
    </div>

    <hr class="separator">
    

</div>

<h2 class="title"><i class="fa-solid fa-chart-pie"></i> Particiones</h2>
<div class="global-card">
    <div class="grid-row-partitions section-title">
        <div>Dispositivo</div>
        <div>Montaje</div>
        <div style="grid-column: span 2;">Tamaño / Uso</div>
    </div>

    <hr class="separator">


</div>

{% endblock %}

{% block extra_js %}
<script>
    // Conexión al stream en tiempo real
    const eventSource = new EventSource('/disks-stream');

    eventSource.onmessage = function (event) {
        try {
            const data = JSON.parse(event.data);

            // Reemplaza por completo el contenido "Cargando..." con el HTML real enviado desde el servidor
            if (data.disk_parts_html) {
                document.getElementById('parts-list').innerHTML = data.disk_parts_html;
            }
            if (data.disk_devices_html) {
                document.getElementById('devices-list').innerHTML = data.disk_devices_html;
            }
        } catch (error) {
            console.error("Error al procesar los datos del disco:", error);
        }
    };

    // Manejo de errores por si se cae la conexión con el servidor
    eventSource.onerror = function(err) {
        console.error("EventSource falló:", err);
    };
</script>
{% endblock %}
