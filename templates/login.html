<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0f1115; /* Fondo carbón casi negro */
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    color: #e3e4e6; /* Blanco gélido */
  }

  .card {
    background: #181a20; /* Gris oscuro neutro */
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 6px;
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
  }

  .header {
    margin-bottom: 32px;
    text-align: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: #e3e4e6;
  }

  h1 span {
    color: #56b6e3; /* Detalle celeste apagado */
  }

  .error-box {
    background: rgba(239, 68, 68, 0.08);
    border-left: 3px solid #f87171;
    padding: 12px;
    margin-bottom: 24px;
    font-size: 12px;
    color: #fca5a5;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #717680; /* Gris atenuado */
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: #0f1115;
    border: 1px solid #2d3139;
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: #ffffff;
    outline: none;
    transition: all 0.2s ease;
  }

  input::placeholder { color: #4b505c; }

  input:focus {
    border-color: #56b6e3;
    box-shadow: 0 0 0 3px rgba(86, 182, 227, 0.1);
  }

  .btn {
    margin-top: 28px;
    width: 100%;
    padding: 14px;
    background: #e3e4e6; /* Botón claro para contraste radical */
    color: #0f1115;
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .btn:hover {
    background: #ffffff;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: #717680;
  }

  .footer a {
    color: #56b6e3;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer a:hover { 
    color: #7dd3fc;
    text-decoration: underline; 
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Inicio de <span>sesión</span></h1>
  </div>

  {% if error %}
  <div class="error-box">
    ⚠ {{ error }}
  </div>
  {% endif %}

  <form action="login" method="POST">
    <div class="field">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" autocomplete="off" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" />
    </div>

    <button type="submit" class="btn">Entrar</button>
  </form>

  <div class="footer">
    ¿Olvidaste tu contraseña? <a href="#">Recupérala</a>
  </div>
</div>

</body>
</html>
