<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    font-family: Georgia, serif;
    color: #111;
  }

  .card {
    background: #fff;
    border-radius: 1.5rem;
    padding: 2.5rem;
    width: 360px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }

  .corner-tl { display: none; }

  .label-tag {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: normal;
    line-height: 1.2;
    margin-bottom: 2rem;
  }

  h1 em {
    font-style: italic;
    color: #555;
  }

  .error-box {
    background: #fff3f3;
    color: #c00;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    margin-bottom: 1.25rem;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.4rem;
  }

  input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ddd;
    padding: 0.5rem 0;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    background: transparent;
    color: #111;
    transition: border-color 0.2s;
  }

  input:focus { border-bottom-color: #111; }

  input::placeholder { color: #ccc; }

  .btn {
    margin-top: 2rem;
    width: 100%;
    padding: 0.85rem;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 0.75rem;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }

  .btn:hover { background: #333; }

  .footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.78rem;
    color: #aaa;
  }

  .footer a { color: #555; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="corner-tl"></div>

  <div class="header">
    <div class="label-tag">Acceso privado</div>
    <h1>Bienvenido<br>de <em>vuelta.</em></h1>
  </div>

  {% if error %}
  <div class="error-box">
    ⚠ &nbsp;{{ error }}
  </div>
  {% endif %}

  <form action="login" method="POST">
    <div class="field">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="nombre de usuario" autocomplete="off" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" />
    </div>

    <button type="submit" class="btn">
      <span>Entrar →</span>
    </button>
  </form>

  <div class="footer">
    ¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a>
  </div>
</div>

</body>
</html>
