<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - System Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reutilizamos tus variables exactas */
        :root {
            --black1: #0a0a0a;
            --black2: #171717;
            --black3: #1E1E1E;
            --black4: #2F2F2F;
            --border-color: #2F2F2F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #f0f0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, sans-serif;
            background-color: var(--black1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Estilo de la tarjeta basado en tus process-card */
        .login-card {
            background-color: var(--black2);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Contenedores de input similares a tu barra de búsqueda */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--black1);
            border: 1px solid var(--black4);
            border-radius: 10px;
            padding: 10px 15px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #999999;
        }

        .input-wrapper i {
            color: #555;
            margin-right: 12px;
            font-size: 16px;
        }

        .input-wrapper input {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        .btn-login{
            width: 100%;
            padding: 12px;
            background: var(--black3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            opacity: 0.8;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-box {
            background-color: rgba(214, 54, 56, 0.1);
            border: 1px solid #d63638;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>Iniciar Sesión</h1>
        </div>

        {% if error %}
        <div class="error-box">
            <i class="fas fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form action="login" method="POST">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="usuario" name="usuario" placeholder="Admin" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>
    </div>

</body>
</html>
