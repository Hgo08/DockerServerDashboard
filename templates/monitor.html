{% extends "base.html" %}

{% block title %}Monitor{% endblock %}


{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  body {
    /* Usamos tus variables principales */
    background: var(--main-bg) !important;
    color: var(--main-text);
  }

  .mon {
    font-family: 'DM Mono', monospace;
    max-width: 900px;
    margin: 60px auto;
    padding: 0 24px;
  }

  .mon-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 52px;
    padding-bottom: 20px;
    /* Usamos la variable de fondo de los menús para el borde sutil */
    border-bottom: 1px solid var(--background-color);
  }

  .mon-title {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.7; /* Le damos opacidad para mantener el tono secundario */
  }

  .mon-live {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--hover-text-color); /* Usamos tu azul llamativo */
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .mon-time {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-color);
    opacity: 0.6;
  }

  .metrics {
    width: 100%;
    border-collapse: separate;
    border-spacing: 2px;
  }

  .metric {
    padding: 36px 40px;
    /* El fondo de la tarjeta ahora usa el gris oscuro o blanco según el tema */
    background: var(--background-color);
    position: relative;
    transition: background 0.2s, color 0.2s;
    width: 50%;
    vertical-align: top;
  }

  .metric:hover { 
    background: var(--hover-color); 
  }

  .m-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.6;
    margin-bottom: 20px;
  }

  .m-value {
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    color: var(--main-text);
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
    border-radius: 20%;
  }

  .m-unit {
    font-size: 14px;
    color: var(--text-color);
    opacity: 0.5;
    margin-left: 4px;
  }

  .m-bar {
    margin-top: 24px;
    height: 2px;
    background: var(--main-bg); /* El fondo de la barra vacía se acopla al fondo de la app */
  }

  .m-fill {
    height: 100%;
    background: var(--hover-text-color); /* Tu azul personalizado */
    transition: width 1s ease, background 0.4s;
    width: 0%;
  }

  /* Estados especiales (Warn y Crit) se quedan con sus colores de alerta */
  .warn .m-value { color: #ecc94b; }
  .warn .m-fill { background: #ecc94b; }
  .crit .m-value { color: #fc8181; }
  .crit .m-fill { background: #fc8181; }

  .metric-temp .m-fill { background: #68d391; }
  .metric-temp.warn .m-fill { background: #f6ad55; }
  .metric-temp.crit .m-fill { background: #fc8181; }

  .mon-footer {
    margin-top: 2px;
    padding: 18px 40px;
    background: var(--background-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mon-footer-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.5;
  }

  #timestamp {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-color);
    opacity: 0.7;
  }
</style>


<div class="mon">


  <div class="mon-header">

    <span class="mon-title">Monitor del sistema</span>

  </div>


  <!-- Contenedor convertido a tabla -->
  <table class="metrics">
    <tr>
      <td class="metric metric-cpu" id="card-cpu">
        <div class="m-label">Uso CPU</div>
        <div>
          <span class="m-value" id="cpu">—</span>
          <span class="m-unit">%</span>
        </div>
        <div class="m-bar"><div class="m-fill" id="bar-cpu"></div></div>
      </td>

      <td class="metric metric-temp" id="card-temp">
        <div class="m-label">Temperatura</div>
        <div>
          <span class="m-value" id="temperatura">—</span>
          <span class="m-unit">°C</span>
        </div>
        <div class="m-bar"><div class="m-fill" id="bar-temp"></div></div>
      </td>
    </tr>

    <tr>
      <td colspan="2" class="metric metric-ram" id="card-ram">
        <div class="m-label">Uso RAM</div>
        <div>
          <span class="m-value" id="ram">—</span>
          <span class="m-unit">GB</span>
        </div>
        <div class="m-bar"><div class="m-fill" id="bar-ram"></div></div>
      </td>
    </tr>

    <tr>
      <td class="metric metric-net" id="card-net-down">
        <div class="m-label">Descarga red</div>
        <div>
          <span class="m-value" id="net-down">—2</span>
          <span class="m-unit">MB/s</span>
        </div>
        <div class="m-bar"><div class="m-fill" id="bar-net-down"></div></div>
      </td>
      
      <td class="metric metric-net" id="card-net-up">
        <div class="m-label">Subida red</div>
        <div>
          <span class="m-value" id="net-up">—2</span>
          <span class="m-unit">MB/s</span>
        </div>
        <div class="m-bar"><div class="m-fill" id="bar-net-up"></div></div>
      </td>
    </tr>
  </table>

  <div class="mon-footer">

    <span class="mon-footer-label">última actualización</span>

    <span id="timestamp">--:--:--</span>

  </div>


</div>

{% endblock %}


{% block extra_js %}

<script>

  //funcion simple para poner los valores del stream en el html usando IDs

  function setMetric(cardId, valueId, barId, value, max, warnAtPercent, critAtPercent) {

    //guarda en card el contenedor del valor buscandolo por la ID

    const card = document.getElementById(cardId);

    //cambia su contenido

    document.getElementById(valueId).textContent = value ?? '—';

    //calcular el porcentaje del valor actual comparado al máximo

    var percent = Math.min((value / max) * 100, 100)

    //cambia el ancho de la barra al porcentaje del valor actual

    document.getElementById(barId).style.width = percent + '%';

    //quita del contenedor las clases warn y crit

    card.classList.remove('warn', 'crit');

    //si el valor supero el porcentaje critico añadir la etiqueta crit para poner el valor en rojo

    //si no llega a critico pero llega al valor de emergencia, se le añade la clase warn para ponerlo en amarillo

    if (percent >= critAtPercent) card.classList.add('crit');

    else if (percent >= warnAtPercent) card.classList.add('warn');

  }


  //crea un event source desde la ruta monitor-stream

  const eventSource = new EventSource('monitor-stream');


  //cuando el event source devuelva algun mensaje

  eventSource.onmessage = function (event) {


    //guardar los datos del stream (eventdata) como json

    const data = JSON.parse(event.data);


    //busca por elemento 'timestamp' y le pone el texto del json

    document.getElementById('timestamp').textContent = data.timestamp;


    //usando la funcion setMetric, asigna cada metrica al html, especificando los % max/warn/crit
    setMetric('card-temp',    'temperatura', 'bar-temp',     data.cpuTemp,                100, 40, 80);
    setMetric('card-cpu',     'cpu',         'bar-cpu',      data.cpu,                    100, 65, 90);
    setMetric('card-ram',     'ram',         'bar-ram',      data.usedRam,      data.totalRam, 50, 90);
    setMetric('card-net-up',  'net-up',      'bar-net-up',   data.netSpeedSent,           15, 60, 80);
    setMetric('card-net-down','net-down',    'bar-net-down', data.netSpeedRecv,           15, 60, 80);
  };

</script>

{% endblock %}
