{% extends "base.html" %}

{% block title %}Monitor - Mi Aplicación{% endblock %}

{% block content %}
<h1>Página de monitor</h1>

<div class="card">
    <h2>Estado del Sistema</h2>
    <p>Contenido específico del monitor aquí...</p>
</div>
<div class="container">
    <div class="card">
        <div class="label">Contador</div>
        <div class="valor" id="contador">0</div>
    </div>
    
    <div class="card">
        <div class="label">Temperatura</div>
        <div class="valor" id="temperatura">0</div>
        <div class="label">°C</div>
    </div>
    
    <div class="card">
        <div class="label">CPU</div>
        <div class="valor" id="cpu">0</div>
    </div>
    
    <div class="card">
        <div class="label">Hora</div>
        <div class="valor" id="timestamp" style="font-size: 32px;">--:--:--</div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
    <script>
        const eventSource = new EventSource('stream');
        eventSource.onmessage = function(event) {
            const datos = JSON.parse(event.data);

            document.getElementById('contador').textContent = datos.contador;
            document.getElementById('temperatura').textContent = datos.temperatura;
            document.getElementById('usuarios').textContent = datos.usuarios;
            document.getElementById('timestamp').textContent = datos.timestamp;
            document.getElementById('cpu').textContent = datos.cpu;
        };

        eventSource.onerror = function(error) {
            document.querySelector('.status').innerHTML = '🔴 Desconectado';
            document.querySelector('.status').style.color = '#e74c3c';
        };

        eventSource.onopen = function() {
            document.querySelector('.status').innerHTML = '🟢 Conectado';
            document.querySelector('.status').style.color = '#27ae60';
        };
    </script>


{% endblock %}
