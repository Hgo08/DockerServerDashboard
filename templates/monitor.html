{% extends "base.html" %}
{% block title %}Monitor{% endblock %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  body {
    background: #0f1117 !important;
    color: #c8d0dc;
  }

  .mon {
    font-family: 'DM Mono', monospace;
    max-width: 900px;
    margin: 60px auto;
    padding: 0 24px;
  }

  /* Header */
  .mon-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 52px;
    padding-bottom: 20px;
    border-bottom: 1px solid #1e2430;
  }

  .mon-title {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #4a5568;
  }

  .mon-live {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #4a5568;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #38a169;
    box-shadow: 0 0 6px #38a169;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Timestamp */
  .mon-time {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #2d3748;
  }

  /* Grid de métricas */
  .metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
  }

  .metric {
    padding: 36px 40px;
    background: #13181f;
    position: relative;
    transition: background 0.2s;
  }

  .metric:hover { background: #161c25; }

  .m-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #4a5568;
    margin-bottom: 20px;
  }

  .m-value {
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    color: #e2e8f0;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }

  .m-unit {
    font-size: 14px;
    color: #4a5568;
    margin-left: 4px;
  }

  /* Barra de progreso */
  .m-bar {
    margin-top: 24px;
    height: 2px;
    background: #1e2430;
  }

  .m-fill {
    height: 100%;
    background: #3a7bd5;
    transition: width 1s ease, background 0.4s;
    width: 0%;
  }

  /* Estados de alerta */
  .warn  .m-value { color: #ecc94b; }
  .warn  .m-fill  { background: #ecc94b; }
  .crit  .m-value { color: #fc8181; }
  .crit  .m-fill  { background: #fc8181; }

  /* Temperatura tiene su propio acento */
  .metric-temp .m-fill { background: #68d391; }
  .metric-temp.warn .m-fill { background: #f6ad55; }
  .metric-temp.crit .m-fill { background: #fc8181; }

  /* Footer */
  .mon-footer {
    margin-top: 2px;
    padding: 18px 40px;
    background: #13181f;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mon-footer-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #2d3748;
  }

  #timestamp {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #4a5568;
  }
</style>

<div class="mon">

  <div class="mon-header">
    <span class="mon-title">Monitor del sistema</span>
    <div class="mon-live">
      <div class="dot"></div>
      en vivo
    </div>
  </div>

  <div class="metrics">

    <!-- Temperatura -->
    <div class="metric metric-temp" id="card-temp">
      <div class="m-label">Temperatura</div>
      <div>
        <span class="m-value" id="temperatura">—</span>
        <span class="m-unit">°C</span>
      </div>
      <div class="m-bar"><div class="m-fill" id="bar-temp"></div></div>
    </div>

    <!-- CPU -->
    <div class="metric metric-cpu" id="card-cpu">
      <div class="m-label">Uso CPU</div>
      <div>
        <span class="m-value" id="cpu">—</span>
        <span class="m-unit">%</span>
      </div>
      <div class="m-bar"><div class="m-fill" id="bar-cpu"></div></div>
    </div>

    <!-- RAM -->
    <div class="metric metric-ram" id="card-ram">
      <div class="m-label">Uso RAM</div>
      <div>
        <span class="m-value" id="ram">—</span>
        <span class="m-unit">GB</span>
      </div>
      <div class="m-bar"><div class="m-fill" id="bar-ram"></div></div>
    </div>

    <!-- Red -->
    <div class="metric metric-net" id="card-net">
      <div class="m-label">Uso Red</div>
      <div>
        <span class="m-value" id="red">—</span>
        <span class="m-unit">MB/s</span>
      </div>
      <div class="m-bar"><div class="m-fill" id="bar-red"></div></div>
    </div>

  </div>

  <div class="mon-footer">
    <span class="mon-footer-label">última actualización</span>
    <span id="timestamp">--:--:--</span>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
  function setMetric(cardId, valueId, barId, value, max, warnAt, critAt) {
    const card = document.getElementById(cardId);
    document.getElementById(valueId).textContent = value ?? '—';
    document.getElementById(barId).style.width = Math.min((value / max) * 100, 100) + '%';
    card.classList.remove('warn', 'crit');
    if (value >= critAt) card.classList.add('crit');
    else if (value >= warnAt) card.classList.add('warn');
  }

  const eventSource = new EventSource('monitor-stream');

  eventSource.onmessage = function(event) {
    const d = JSON.parse(event.data);

    document.getElementById('timestamp').textContent = d.timestamp;

    setMetric('card-temp', 'temperatura', 'bar-temp', d.temperatura, 100, 65, 80);
    setMetric('card-cpu',  'cpu',         'bar-cpu',  d.cpu,         100, 65, 85);
    setMetric('card-ram',  'ram',         'bar-ram',  d.ram,         16,  10, 14);
    setMetric('card-net',  'red',         'bar-red',  d.red,         100, 60, 80);
  };
</script>
{% endblock %}
