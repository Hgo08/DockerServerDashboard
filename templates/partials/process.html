{% for proc in procesos %}
<div class="process-row grid-row" data-cpu="30" data-ram="512" data-user="root">
    <div class="col-pid">{{ proc.pid }}</div>
    <div class="col-name">{{ proc.name }}</div>
    <div class="col-cpu">{{ proc.cpu_percent }}%</div>
    <div class="col-ram">{{ proc.ram }} MB</div>
    <div class="col-user">{{ proc.username or 'N/A' }}</div>
</div>
{% endfor %}
