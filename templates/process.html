{% extends "base.html" %}
{% block content %}

<style>
.process-card {
    /* Enlazamos con las variables de base.html */
    border: 1px solid var(--card-border);
    background-color: var(--card-bg);
    border-radius: 10px;
    padding: 10px;
    transition: background-color 0.3s, border-color 0.3s;
}

.title {
    margin-top: 20px;
    margin-bottom: 20px;
    color: var(--main-text); /* Cambia automáticamente con el tema */
}

.grid-row {
    display: grid;
    grid-template-columns: 80px 1fr 100px 100px 100px 100px;
    align-items: center;
    gap: 15px;
    color: var(--main-text); /* Evita el selector universal '*' fijo */
}

.toolbar {
    padding: 10px;
    padding-bottom: 20px;
}

.search-container {
    grid-column: span 2;
    display: flex;
    align-items: center;
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 5px 15px;
    height: 36px;
    color: var(--text-color);
}

.search-input {
    width: 100%;
    border: none;
    outline: none;
    background: none;
    margin-left: 10px;
    color: var(--main-text); /* El texto que escribe el usuario cambia de color */
}

.filter-btn {
    background: none;
    border: 1px solid var(--card-border);
    border-radius: 15px;
    padding: 6px 0;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    height: 36px;
    text-align: center;
    color: var(--text-color);
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
}

.filter-btn:hover, .filter-btn.active {
    background-color: var(--hover-color);
    color: var(--hover-text-color);
}

.actions-label {
    text-align: right;
    color: var(--text-color);
}

.process-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.process-row {
    border-radius: 20px;
    padding: 10px;
    transition: background-color 0.2s;
}

/* Efecto hover sutil en las filas de los procesos */
.process-row:hover {
    background-color: var(--hover-color);
}

.col-pid {
    /* Usamos el borde dinámico de la base */
    border-right: 1px solid var(--card-border);
    padding-right: 10px;
    color: var(--text-color);
}

.col-cpu, .col-ram, .col-user {
    text-align: center;
}

.col-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
}

.action-btn {
    width: 18px;
    height: 18px;
    border: 1px solid var(--card-border);
    border-radius: 50%;
    background: #dc3545; /* Rojo estandarizado */
    cursor: pointer;
    transition: transform 0.1s;
}

.action-btn:hover {
    transform: scale(1.1);
    background: #bd2130;
}
</style>
<div class="process-card">
    <div class="toolbar grid-row">
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" class="search-input" placeholder="Buscar por nombre o PID...">
        </div>
        <button type="button" class="filter-btn active" data-sort="cpu_percent">CPU <span class="sort-arrow"><i class="fa-solid fa-arrow-down"></i></span></button>
        <button type="button" class="filter-btn" data-sort="ram">RAM <span class="sort-arrow"></span></button>
        <button type="button" class="filter-btn" data-sort="username">Usuario <span class="sort-arrow"></span></button>
        <div class="actions-label">Actions</div>
    </div>

    <div class="process-list" id="process-list">
        <div class="process-row grid-row" data-cpu="30" data-ram="512" data-user="root">
            <div class="col-pid">43234</div>
            <div class="col-name">nombre proceso</div>
            <div class="col-cpu">30%</div>
            <div class="col-ram">512MB</div>
            <div class="col-user">root</div>
            <div class="col-actions">
                <button class="action-btn" onclick="matarProceso(43234)"></button>
            </div>
        </div>

        <div class="process-row grid-row" data-cpu="2" data-ram="2" data-user="hugoc">
            <div class="col-pid">23123</div>
            <div class="col-name">python</div>
            <div class="col-cpu">2%</div>
            <div class="col-ram">2MB</div>
            <div class="col-user">hugoc</div>
            <div class="col-actions">
                <button class="action-btn" onclick="matarProceso(23123)"></button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let currentSort = 'cpu_percent';
    let inverted = true;
    let eventSource = null;

    function conectarSSE() {
        if (eventSource) {
            eventSource.close();
        }

        const searchTerm = document.getElementById('search').value;
        const url = `/process-stream?search=${encodeURIComponent(searchTerm)}&sort=${currentSort}&inverted=${inverted}`;
        
        eventSource = new EventSource(url);

        eventSource.onmessage = function(event) {
            document.getElementById('process-list').innerHTML = event.data;
        };

        eventSource.onerror = function() {
            console.error("Error en el stream. Reintentando...");
            eventSource.close();
        };
    }

    document.getElementById('search').addEventListener('input', () => {
        conectarSSE();
    });

    document.querySelectorAll('.filter-btn').forEach(boton => {
        boton.addEventListener('click', function() {
            const nuevoSort = this.getAttribute('data-sort');
            const arrowContainer = this.querySelector('.sort-arrow');
            
            if (currentSort === nuevoSort) {
                inverted = !inverted;
            } else {
                currentSort = nuevoSort;
                inverted = true;
            }
            
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active');
                b.querySelector('.sort-arrow').innerHTML = '';
            });

            this.classList.add('active');

            const iconClass = inverted ? 'fa-arrow-down' : 'fa-arrow-up';
            arrowContainer.innerHTML = `<i class="fa-solid ${iconClass}"></i>`;

            conectarSSE();
        });
    });

    conectarSSE();

    function matarProceso(pid) {
        if(confirm(`¿Deseas finalizar el proceso ${pid}?`)) {
            fetch(`/kill/${pid}`, { method: 'POST' });
        }
    }
</script>
{% endblock %}
