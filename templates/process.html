{% extends "base.html" %}
{% block content %}
<style>
    .btn-group {
        border-radius: 100px;
        border: 1px solid #16ff0a;
    }
</style>
<div class="container mt-4">
    <div class="row mb-4 justify-content-center align-items-center g-3">
        <div class="col-12 col-md-4">
            <input type="text" id="busqueda" class="form-control" placeholder="Buscar por nombre o PID...">
        </div>
        <div class="col-12 col-md-auto text-center">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-primary btn-sort active" data-sort="cpu_percent">CPU</button>
                <button type="button" class="btn btn-outline-primary btn-sort" data-sort="memory_percent">RAM</button>
                <button type="button" class="btn btn-outline-primary btn-sort" data-sort="pid">PID</button>
                <button type="button" class="btn btn-outline-primary btn-sort" data-sort="name">Nombre</button>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>PID</th>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>CPU %</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let currentSort = 'cpu_percent';
    let eventSource = null;

    function conectarSSE() {
        if (eventSource) {
            eventSource.close();
        }

        const searchTerm = document.getElementById('busqueda').value;
        const url = `/process-stream?search=${encodeURIComponent(searchTerm)}&sort=${currentSort}`;
        
        eventSource = new EventSource(url);

        eventSource.onmessage = function(event) {
            document.getElementById('cuerpo-tabla').innerHTML = event.data;
        };

        eventSource.onerror = function() {
            console.error("Error en el stream. Reintentando...");
            eventSource.close();
        };
    }

    document.getElementById('busqueda').addEventListener('input', () => {
        conectarSSE();
    });

    document.querySelectorAll('.btn-sort').forEach(boton => {
        boton.addEventListener('click', function() {
            document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            currentSort = this.getAttribute('data-sort');
            conectarSSE();
        });
    });

    conectarSSE();

    function matarProceso(pid) {
        if(confirm(`¿Deseas finalizar el proceso ${pid}?`)) {
            fetch(`/kill/${pid}`, { method: 'POST' });
        }
    }
</script>
{% endblock %}
