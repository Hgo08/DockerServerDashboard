{% extends "base.html" %}
{% block title %}Usuarios{% endblock %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  body {
    background: #0f1117 !important;
    color: #c8d0dc;
  }

  .mon {
    font-family: 'DM Mono', monospace;
    max-width: 900px;
    margin: 60px auto;
    padding: 0 24px;
  }

  /* Header */
  .mon-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 52px;
    padding-bottom: 20px;
    border-bottom: 1px solid #1e2430;
  }

  .mon-title {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #4a5568;
  }

  .mon-live {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #4a5568;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #38a169;
    box-shadow: 0 0 6px #38a169;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Contenedor de Usuarios (Reutiliza la tabla de logs) */
  .usr-table {
    background: #13181f;
  }

  /* Filas de Usuarios */
  .usr-row {
    display: grid;
    /* Columnas: Avatar/Icono(40px) | Nombre Usuario(200px) | Rol/Permisos(Libre) | Acción(120px) */
    grid-template-columns: 40px 200px 1fr 120px;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid #1a2030;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .usr-row:hover { background: #161c25; }
  .usr-row:last-child { border-bottom: none; }

  /* Icono de usuario simple estilo terminal */
  .usr-avatar {
    font-size: 14px;
    color: #4a5568;
  }

  .usr-name {
    font-size: 12px;
    color: #c8d0dc;
    font-weight: 400;
  }

  /* Badge de Rol (Reutiliza el concepto de tus badges de logs) */
  .usr-role {
    font-size: 8px;
    letter-spacing: 0.2em;
    padding: 3px 8px;
    text-transform: uppercase;
    width: fit-content;
  }
  
  .role-admin { background: #3a1a1a; color: #fc8181; } /* Rojo suave para Administradores */
  .role-user { background: #1a2a3a; color: #63b3ed; }  /* Azul suave para Usuarios normales */

  /* Botón de acción estilo terminal */
  .usr-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid #1e2430;
    background: #1a2030;
    color: #8896a8;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .usr-btn:hover {
    background: #2d3748;
    color: #fc8181;
    border-color: #3a1a1a;
  }
</style>

<div class="mon">

  <div class="mon-header">
    <span class="mon-title">Gestión de Usuarios</span>
    <div class="mon-live">
      <div class="dot"></div>
      seguro
    </div>
  </div>

  <div class="usr-table">
    
    <div class="usr-row">
      <div class="usr-avatar">👤</div>
      <div class="usr-name">admin</div>
      <div>
        <span class="usr-role role-admin">Administrador</span>
      </div>
      <button class="usr-btn">Eliminar</button>
    </div>

    <div class="usr-row">
      <div class="usr-avatar">👤</div>
      <div class="usr-name">poyonsio</div>
      <div>
        <span class="usr-role role-user">Usuario</span>
      </div>
      <button class="usr-btn">Eliminar</button>
    </div>

  </div>

</div>
{% endblock %}
